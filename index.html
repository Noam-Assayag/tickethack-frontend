<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickethack</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- MENU -->
    <nav id="menu">
        <a href="index.html" class="homePage">Tickethack</a>

        <div id="nav-links">
            <a href="cart.html">Cart</a>
            <a href="bookings.html">Bookings</a>
        </div>
    </nav>
    <div id="content">
        <h2 class="description-title">Explore the world effortlessly by train!</h2>
        <p class="description">Compare, book and enjoy cheap prices for train tickets: your journey starts on Tickethack.</p>
        <div id="searchTrips">
            <div class="left">
               <div class="inputs">
                    <input type="text" class="departure" placeholder="Departure">
                    <input type="text" class="arrival" placeholder="Arrival">
                </div>

                    <input type="date" class="date">

                <button class="search-btn">Search</button>
            </div>
            <div class="right">
                <div id="defaultMessage">
                    <img src="images/train.png" alt="Train">
                    <div class="separator"></div>
                    <p>It's time to book your future trip.</p>
                </div>
                <div id="noResult">
                    <img src="images/notfound.png" alt="No result">
                    <div class="separator"></div>
                    <p>No trip found.</p>
                </div>
                <div class="tripsList"></div>

            </div>
        </div>
    </div>
    
<script src="script.js"></script>
</body>
</html>
