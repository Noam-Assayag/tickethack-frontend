<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickethack</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- MENU -->
    <nav id="menu">
        <a href="index.html" class="homePage">Tickethack</a>

        <div id="nav-links">
            <a href="cart.html">Cart</a>
            <a href="bookings.html">Bookings</a>
        </div>
    </nav>
    <main class="cart-page">

    <div class="page-container">

        <h2 class="title-cart">My cart</h2>

        <div class="cartList">
            <div class="cartItem">
                <span>Bruxelles → Paris</span>
                <span>09:05</span>
                <span>47€</span>
                <button class="delete-btn">x</button>
            </div>
        </div>

        <div class="cartTotal">
            <span>Total : <span id="totalPrice">0€</span></span>
            <button id="purchaseBtn" class="purchase-btn">Purchase</button>
        </div>

    </div>

</main>
<script src="cart.js"></script>
</body>
</html>
